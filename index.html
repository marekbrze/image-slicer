<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Slicer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #111;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: #1a1a1a;
    border-bottom: 1px solid #2a2a2a;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    letter-spacing: 0.02em;
  }

  header .spacer { flex: 1; }

  .hint {
    font-size: 12px;
    color: #666;
  }

  .btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.15s;
  }

  .btn-primary {
    background: #3b82f6;
    color: #fff;
  }
  .btn-primary:hover { background: #2563eb; }

  .btn-ghost {
    background: transparent;
    color: #999;
    border: 1px solid #333;
  }
  .btn-ghost:hover { background: #222; color: #ccc; }

  .btn-sm {
    padding: 4px 10px;
    font-size: 12px;
    border-radius: 4px;
  }

  /* ── Main layout ── */
  main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 190px;
    flex-shrink: 0;
    background: #141414;
    border-right: 1px solid #222;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 10px 6px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #444;
    flex-shrink: 0;
  }

  .sidebar-section-header .btn-sidebar-add {
    background: transparent;
    border: none;
    color: #555;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0 2px;
    border-radius: 3px;
  }
  .sidebar-section-header .btn-sidebar-add:hover { color: #aaa; background: #222; }

  #project-list,
  #image-list {
    list-style: none;
    overflow-y: auto;
    flex-shrink: 0;
  }

  #project-list {
    border-bottom: 1px solid #1e1e1e;
    max-height: 40%;
  }

  #image-list { flex: 1; overflow-y: auto; }

  .sidebar-item {
    display: flex;
    align-items: center;
    padding: 5px 10px;
    font-size: 12px;
    color: #777;
    cursor: pointer;
    gap: 6px;
  }

  .sidebar-item:hover { background: #1c1c1c; color: #ccc; }

  .sidebar-item.active {
    background: #1e2a3a;
    color: #e0e0e0;
  }

  .sidebar-item .item-name {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sidebar-item input.rename-input {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #3b82f6;
    border-radius: 3px;
    color: #e0e0e0;
    font-size: 12px;
    padding: 1px 4px;
    outline: none;
    min-width: 0;
  }

  .sidebar-item .item-edit,
  .sidebar-item .item-remove {
    opacity: 0;
    font-size: 11px;
    color: #555;
    cursor: pointer;
    flex-shrink: 0;
    line-height: 1;
    padding: 2px 3px;
    border-radius: 3px;
  }

  .sidebar-item:hover .item-edit,
  .sidebar-item:hover .item-remove { opacity: 1; }
  .sidebar-item .item-edit:hover   { color: #60a5fa; background: #1a243a; }
  .sidebar-item .item-remove:hover { color: #f43f5e; background: #2a1a1e; }

  .sidebar-item .item-thumb {
    width: 28px;
    height: 20px;
    object-fit: cover;
    border-radius: 2px;
    background: #2a2a2a;
    flex-shrink: 0;
  }

  .sidebar-item .drag-handle {
    opacity: 0;
    color: #444;
    cursor: grab;
    flex-shrink: 0;
    font-size: 11px;
    padding: 0 2px;
    line-height: 1;
    user-select: none;
  }
  .sidebar-item:hover .drag-handle { opacity: 1; }
  .sidebar-item.dragging { opacity: 0.35; }
  .sidebar-item.drag-over-above { border-top: 2px solid #3b82f6; }
  .sidebar-item.drag-over-below { border-bottom: 2px solid #3b82f6; }

  /* Sidebar resize handle */
  #sidebar-resizer {
    width: 4px;
    flex-shrink: 0;
    background: #222;
    cursor: ew-resize;
    transition: background 0.15s;
  }
  #sidebar-resizer:hover,
  #sidebar-resizer.resizing { background: #3b82f6; }

  /* Scrollbars in sidebar */
  #project-list::-webkit-scrollbar,
  #image-list::-webkit-scrollbar { width: 4px; }
  #project-list::-webkit-scrollbar-track,
  #image-list::-webkit-scrollbar-track { background: transparent; }
  #project-list::-webkit-scrollbar-thumb,
  #image-list::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ── Panels ── */
  .panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-header {
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #555;
    background: #161616;
    border-bottom: 1px solid #222;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .panel-header .count {
    background: #2a2a2a;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 11px;
    color: #888;
  }

  .divider {
    width: 1px;
    background: #222;
    flex-shrink: 0;
  }

  .panel-body {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 16px;
  }

  /* ── Drop zone / empty state ── */
  .drop-zone {
    border: 2px dashed #2a2a2a;
    border-radius: 12px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }

  .drop-zone:hover,
  .drop-zone.drag-over {
    border-color: #3b82f6;
    background: rgba(59,130,246,0.05);
  }

  .drop-zone svg {
    width: 40px;
    height: 40px;
    color: #444;
    margin-bottom: 14px;
  }

  .drop-zone p {
    font-size: 14px;
    color: #555;
    margin-bottom: 6px;
  }

  .drop-zone small {
    font-size: 12px;
    color: #3a3a3a;
  }

  /* ── Image editor (left panel) ── */
  #editor-wrap {
    position: relative;
    display: inline-block;
    cursor: crosshair;
    user-select: none;
    line-height: 0;
  }

  #editor-wrap img {
    display: block;
    max-width: 100%;
    height: auto;
    pointer-events: none;
  }

  /* ── Slice lines ── */
  .slice-line {
    position: absolute;
    left: 0;
    right: 0;
    height: 2px;
    background: #f43f5e;
    cursor: ns-resize;
    z-index: 10;
  }

  .slice-line::before {
    /* expanded hit area */
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: -6px; bottom: -6px;
  }

  .slice-line .line-handle {
    position: absolute;
    right: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: #f43f5e;
    color: #fff;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    line-height: 1.6;
    pointer-events: all;
  }

  .slice-line .line-label {
    position: absolute;
    left: 6px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(244,63,94,0.85);
    color: #fff;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    line-height: 1.6;
    pointer-events: none;
  }

  /* ── Trim handles ── */
  .trim-line {
    position: absolute;
    top: 0;
    bottom: 0;
    width: 2px;
    background: #f43f5e;
    cursor: ew-resize;
    z-index: 11;
  }

  .trim-line::before {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    left: -6px; right: -6px;
  }

  .trim-handle {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 22px;
    background: #f43f5e;
    border-radius: 4px;
    cursor: ew-resize;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .trim-handle::after {
    content: '';
    display: block;
    width: 2px;
    height: 10px;
    background: rgba(255,255,255,0.5);
    border-radius: 1px;
    box-shadow: 3px 0 0 rgba(255,255,255,0.5), -3px 0 0 rgba(255,255,255,0.5);
  }

  .trim-overlay {
    position: absolute;
    top: 0;
    bottom: 0;
    background: rgba(0,0,0,0.5);
    pointer-events: none;
    z-index: 9;
  }

  .btn-ghost.trim-active {
    color: #f43f5e;
    border-color: rgba(244,63,94,0.4);
  }
  .btn-ghost.trim-active:hover { background: rgba(244,63,94,0.08); }

  /* ── Right panel slices ── */
  .slice-item {
    margin-bottom: 16px;
    background: #1a1a1a;
    border: 1px solid #222;
    border-radius: 8px;
    overflow: hidden;
  }

  .slice-item-header {
    display: flex;
    align-items: center;
    padding: 7px 10px;
    background: #161616;
    border-bottom: 1px solid #222;
    gap: 8px;
  }

  .slice-item-header .slice-dims {
    font-size: 11px;
    color: #444;
    flex-shrink: 0;
  }

  .slice-item-header .slice-name {
    font-size: 12px;
    color: #999;
    flex: 1;
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 4px;
    margin-left: -4px;
  }
  .slice-item-header .slice-name:hover { background: #222; color: #e0e0e0; }

  .slice-item-header .slice-name-input {
    flex: 1;
    background: #2a2a2a;
    border: 1px solid #3b82f6;
    border-radius: 3px;
    color: #e0e0e0;
    font-size: 12px;
    padding: 1px 4px;
    outline: none;
    min-width: 0;
    margin-left: -4px;
  }

  .slice-item canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }

  /* ── Scrollbars ── */
  .panel-body::-webkit-scrollbar { width: 6px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }

  /* ── Empty right panel ── */
  .empty-right {
    color: #3a3a3a;
    font-size: 13px;
    text-align: center;
    padding: 60px 20px;
  }
</style>
</head>
<body>

<header>
  <h1>Image Slicer</h1>
  <span class="hint">Click on image to add cut lines · Drag to move · Double-click to remove</span>
  <span class="spacer"></span>
  <button class="btn btn-primary btn-sm" id="btn-upload">Add image</button>
  <input type="file" id="file-input" accept="image/*" style="display:none">
</header>

<main>
  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-section-header">
      Projects
      <button class="btn-sidebar-add" id="btn-new-project" title="New project">+</button>
    </div>
    <ul id="project-list"></ul>

    <div class="sidebar-section-header" id="images-heading">
      Images
      <button class="btn-sidebar-add" id="btn-add-image" title="Add image">+</button>
    </div>
    <ul id="image-list"></ul>
  </div>

  <div id="sidebar-resizer"></div>

  <!-- LEFT PANEL -->
  <div class="panel" id="left-panel">
    <div class="panel-header">
      Original
      <span class="count" id="line-count">0 lines</span>
    </div>
    <div class="panel-body" id="left-body">
      <!-- Drop zone shown when no image -->
      <div class="drop-zone" id="drop-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 20M14 8h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        <p>Drop image here or click to upload</p>
        <small>Also works with Ctrl+V paste</small>
      </div>
      <!-- Editor shown when image is loaded -->
      <div id="editor-wrap" style="display:none">
        <img id="source-img" alt="screenshot">
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- RIGHT PANEL -->
  <div class="panel" id="right-panel">
    <div class="panel-header">
      Slices
      <span class="count" id="slice-count">0</span>
    </div>
    <div class="panel-body" id="right-body">
      <div class="empty-right" id="empty-right">Load an image and add cut lines to see slices</div>
    </div>
  </div>
</main>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  projects: [],
  activeProject: 0,
  activeImage: 0,
  sidebarWidth: 190
};

function currentProject() {
  return state.projects[state.activeProject] ?? null;
}

function currentImage() {
  return currentProject()?.images[state.activeImage] ?? null;
}

function ensureActiveIndicesValid() {
  if (state.projects.length === 0) return;
  state.activeProject = Math.max(0, Math.min(state.activeProject, state.projects.length - 1));
  const proj = currentProject();
  if (proj) {
    state.activeImage = Math.max(0, Math.min(state.activeImage, proj.images.length - 1));
    if (proj.images.length === 0) state.activeImage = 0;
  }
}

// ─── Drag-to-reorder state ────────────────────────────────────────────────────
let dragType = null;   // 'project' | 'image'
let dragFrom = null;   // source index

function moveProject(from, to) {
  if (from === to) return;
  const [item] = state.projects.splice(from, 1);
  state.projects.splice(to, 0, item);
  if (state.activeProject === from) {
    state.activeProject = to;
  } else if (from < state.activeProject && to >= state.activeProject) {
    state.activeProject--;
  } else if (from > state.activeProject && to <= state.activeProject) {
    state.activeProject++;
  }
  save(); render();
}

function moveImage(from, to) {
  if (from === to) return;
  const proj = currentProject();
  if (!proj) return;
  const [item] = proj.images.splice(from, 1);
  proj.images.splice(to, 0, item);
  if (state.activeImage === from) {
    state.activeImage = to;
  } else if (from < state.activeImage && to >= state.activeImage) {
    state.activeImage--;
  } else if (from > state.activeImage && to <= state.activeImage) {
    state.activeImage++;
  }
  save(); render();
}

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const fileInput       = document.getElementById('file-input');
const btnUpload       = document.getElementById('btn-upload');
const btnNewProject   = document.getElementById('btn-new-project');
const btnAddImage     = document.getElementById('btn-add-image');
const projectList     = document.getElementById('project-list');
const imageList       = document.getElementById('image-list');
const imagesHeading   = document.getElementById('images-heading');
const dropZone        = document.getElementById('drop-zone');
const editorWrap      = document.getElementById('editor-wrap');
const sourceImg       = document.getElementById('source-img');
const rightBody       = document.getElementById('right-body');
const lineCountEl     = document.getElementById('line-count');
const sliceCountEl    = document.getElementById('slice-count');
const emptyRight      = document.getElementById('empty-right');
const sidebar         = document.getElementById('sidebar');
const sidebarResizer  = document.getElementById('sidebar-resizer');

// ─── Persistence ──────────────────────────────────────────────────────────────
function save() {
  try {
    localStorage.setItem('slicer_v2', JSON.stringify(state));
  } catch (e) {
    // storage quota exceeded (large images) — ignore
  }
}

function load() {
  // Try new format
  const raw = localStorage.getItem('slicer_v2');
  if (raw) {
    try {
      const saved = JSON.parse(raw);
      Object.assign(state, saved);
      return;
    } catch (e) {}
  }

  // Migrate from old format
  const oldImg   = localStorage.getItem('slicer_image');
  const oldLines = localStorage.getItem('slicer_lines');
  if (oldImg) {
    state.projects = [{
      name: 'Project 1',
      images: [{
        name: 'image',
        dataUrl: oldImg,
        lines: oldLines ? JSON.parse(oldLines) : []
      }]
    }];
    state.activeProject = 0;
    state.activeImage = 0;
    localStorage.removeItem('slicer_image');
    localStorage.removeItem('slicer_lines');
    save();
  }
}

// ─── Project operations ───────────────────────────────────────────────────────
function createProject(name, { autoRename = false } = {}) {
  state.projects.push({ name, images: [] });
  state.activeProject = state.projects.length - 1;
  state.activeImage = 0;
  if (autoRename) _pendingRename = 'project';
  save();
  render();
}

function switchProject(idx) {
  state.activeProject = idx;
  state.activeImage = 0;
  save();
  render();
}

function renameProject(idx, newName) {
  state.projects[idx].name = newName.trim() || `Project ${idx + 1}`;
  save();
  renderProjectList();
}

function removeProject(idx) {
  state.projects.splice(idx, 1);
  if (state.projects.length === 0) {
    state.projects.push({ name: 'Project 1', images: [] });
  }
  ensureActiveIndicesValid();
  save();
  render();
}

// ─── Image operations ─────────────────────────────────────────────────────────
function addImageToProject(file) {
  if (!file || !file.type.startsWith('image/')) return;
  if (!currentProject()) createProject('Project 1');
  const reader = new FileReader();
  reader.onload = e => {
    const nameWithoutExt = file.name.replace(/\.[^.]+$/, '') || 'image';
    currentProject().images.push({
      name: nameWithoutExt,
      dataUrl: e.target.result,
      lines: [],
      trimLeft: 0,
      trimRight: 1,
      sliceTrimDisabled: []
    });
    state.activeImage = currentProject().images.length - 1;
    _pendingRename = 'image';
    save();
    render();
  };
  reader.readAsDataURL(file);
}

function switchImage(idx) {
  state.activeImage = idx;
  save();
  render();
}

function renameImage(projIdx, imgIdx, newName) {
  state.projects[projIdx].images[imgIdx].name = newName.trim().replace(/\.[^.]+$/, '') || 'image';
  save();
  renderImageList();
}

function removeImage(projIdx, imgIdx) {
  state.projects[projIdx].images.splice(imgIdx, 1);
  ensureActiveIndicesValid();
  save();
  render();
}

// ─── Filename helper ──────────────────────────────────────────────────────────
function safeFilename(name) {
  return (name || 'unnamed').trim().replace(/[/\\:*?"<>|]/g, '_');
}

// Pending auto-rename after next render
let _pendingRename = null; // 'project' | 'image'

// ─── Inline rename helper ────────────────────────────────────────────────────
function startRename(nameSpan, onCommit) {
  const original = nameSpan.textContent;
  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = original;
  nameSpan.replaceWith(input);
  input.focus();
  input.select();

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    onCommit(input.value.trim() || original);
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; onCommit(original); }
  });
  input.addEventListener('blur', commit);
}

function startSliceRename(nameSpan, sliceIdx) {
  const img = currentImage();
  if (!img) return;
  const current = img.sliceNames[sliceIdx] || '';
  const input = document.createElement('input');
  input.className = 'slice-name-input';
  input.value = current;
  input.placeholder = `Slice ${sliceIdx + 1}`;
  nameSpan.replaceWith(input);
  input.focus();
  input.select();

  let committed = false;
  function commit() {
    if (committed) return;
    committed = true;
    renameSlice(sliceIdx, input.value);
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; renameSlice(sliceIdx, current); }
  });
  input.addEventListener('blur', commit);
}

// ─── Render coordinator ───────────────────────────────────────────────────────
function render() {
  renderProjectList();
  renderImageList();
  renderEditor();
}

function renderProjectList() {
  projectList.innerHTML = '';
  state.projects.forEach((proj, i) => {
    const li = document.createElement('li');
    li.className = 'sidebar-item' + (i === state.activeProject ? ' active' : '');
    li.draggable = true;

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.textContent = '⠿';
    handle.addEventListener('mousedown', e => e.stopPropagation());

    const nameSpan = document.createElement('span');
    nameSpan.className = 'item-name';
    nameSpan.textContent = proj.name;
    nameSpan.addEventListener('dblclick', e => {
      e.stopPropagation();
      startRename(nameSpan, val => renameProject(i, val));
    });

    const editBtn = document.createElement('span');
    editBtn.className = 'item-edit';
    editBtn.textContent = '✎';
    editBtn.title = 'Rename project';
    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      startRename(nameSpan, val => renameProject(i, val));
    });

    const removeBtn = document.createElement('span');
    removeBtn.className = 'item-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove project';
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      removeProject(i);
    });

    li.addEventListener('dragstart', e => {
      dragType = 'project'; dragFrom = i;
      li.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    });
    li.addEventListener('dragend', () => {
      dragType = null; dragFrom = null;
      document.querySelectorAll('#project-list .sidebar-item').forEach(el => {
        el.classList.remove('dragging', 'drag-over-above', 'drag-over-below');
      });
    });
    li.addEventListener('dragover', e => {
      if (dragType !== 'project') return;
      e.preventDefault(); e.stopPropagation();
      const rect = li.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      document.querySelectorAll('#project-list .sidebar-item').forEach(el => {
        el.classList.remove('drag-over-above', 'drag-over-below');
      });
      li.classList.add(e.clientY < mid ? 'drag-over-above' : 'drag-over-below');
    });
    li.addEventListener('dragleave', () => {
      li.classList.remove('drag-over-above', 'drag-over-below');
    });
    li.addEventListener('drop', e => {
      if (dragType !== 'project') return;
      e.preventDefault(); e.stopPropagation();
      const rect = li.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      let to = e.clientY < mid ? i : i + 1;
      if (dragFrom < to) to--;
      moveProject(dragFrom, to);
    });

    li.appendChild(handle);
    li.appendChild(nameSpan);
    li.appendChild(editBtn);
    li.appendChild(removeBtn);
    li.addEventListener('click', () => switchProject(i));
    projectList.appendChild(li);
  });

  if (_pendingRename === 'project') {
    _pendingRename = null;
    const activeItem = projectList.children[state.activeProject];
    if (activeItem) {
      const nameSpan = activeItem.querySelector('.item-name');
      if (nameSpan) startRename(nameSpan, val => renameProject(state.activeProject, val));
    }
  }
}

function renderImageList() {
  imageList.innerHTML = '';
  const proj = currentProject();

  if (!proj) return;

  proj.images.forEach((img, i) => {
    const li = document.createElement('li');
    li.className = 'sidebar-item' + (i === state.activeImage ? ' active' : '');
    li.draggable = true;

    const handle = document.createElement('span');
    handle.className = 'drag-handle';
    handle.textContent = '⠿';
    handle.addEventListener('mousedown', e => e.stopPropagation());

    const thumb = document.createElement('img');
    thumb.className = 'item-thumb';
    thumb.src = img.dataUrl;
    thumb.alt = '';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'item-name';
    nameSpan.textContent = img.name;
    nameSpan.addEventListener('dblclick', e => {
      e.stopPropagation();
      startRename(nameSpan, val => renameImage(state.activeProject, i, val));
    });

    const editBtn = document.createElement('span');
    editBtn.className = 'item-edit';
    editBtn.textContent = '✎';
    editBtn.title = 'Rename image';
    editBtn.addEventListener('click', e => {
      e.stopPropagation();
      startRename(nameSpan, val => renameImage(state.activeProject, i, val));
    });

    const removeBtn = document.createElement('span');
    removeBtn.className = 'item-remove';
    removeBtn.textContent = '×';
    removeBtn.title = 'Remove image';
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      removeImage(state.activeProject, i);
    });

    li.addEventListener('dragstart', e => {
      dragType = 'image'; dragFrom = i;
      li.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    });
    li.addEventListener('dragend', () => {
      dragType = null; dragFrom = null;
      document.querySelectorAll('#image-list .sidebar-item').forEach(el => {
        el.classList.remove('dragging', 'drag-over-above', 'drag-over-below');
      });
    });
    li.addEventListener('dragover', e => {
      if (dragType !== 'image') return;
      e.preventDefault(); e.stopPropagation();
      const rect = li.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      document.querySelectorAll('#image-list .sidebar-item').forEach(el => {
        el.classList.remove('drag-over-above', 'drag-over-below');
      });
      li.classList.add(e.clientY < mid ? 'drag-over-above' : 'drag-over-below');
    });
    li.addEventListener('dragleave', () => {
      li.classList.remove('drag-over-above', 'drag-over-below');
    });
    li.addEventListener('drop', e => {
      if (dragType !== 'image') return;
      e.preventDefault(); e.stopPropagation();
      const rect = li.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      let to = e.clientY < mid ? i : i + 1;
      if (dragFrom < to) to--;
      moveImage(dragFrom, to);
    });

    li.appendChild(handle);
    li.appendChild(thumb);
    li.appendChild(nameSpan);
    li.appendChild(editBtn);
    li.appendChild(removeBtn);
    li.addEventListener('click', () => switchImage(i));
    imageList.appendChild(li);
  });

  if (_pendingRename === 'image') {
    _pendingRename = null;
    const activeItem = imageList.children[state.activeImage];
    if (activeItem) {
      const nameSpan = activeItem.querySelector('.item-name');
      if (nameSpan) startRename(nameSpan, val => renameImage(state.activeProject, state.activeImage, val));
    }
  }
}

function renderEditor() {
  const img = currentImage();
  if (!img) {
    dropZone.style.display   = '';
    editorWrap.style.display = 'none';
    rightBody.innerHTML      = '';
    rightBody.appendChild(emptyRight);
    emptyRight.style.display = '';
    lineCountEl.textContent  = '0 lines';
    sliceCountEl.textContent = '0';
    return;
  }

  if (sourceImg.src === img.dataUrl) {
    dropZone.style.display   = 'none';
    editorWrap.style.display = 'inline-block';
    renderLines();
    renderTrimHandles();
    renderSlices();
  } else {
    sourceImg.onload = () => {
      dropZone.style.display   = 'none';
      editorWrap.style.display = 'inline-block';
      renderLines();
      renderTrimHandles();
      renderSlices();
    };
    sourceImg.src = img.dataUrl;
  }
}

// ─── Lines rendering ──────────────────────────────────────────────────────────
function renderLines() {
  editorWrap.querySelectorAll('.slice-line').forEach(el => el.remove());

  const img = currentImage();
  if (!img) return;

  const imgH = sourceImg.offsetHeight;

  img.lines.forEach((frac, idx) => {
    const top = frac * imgH;
    const line = document.createElement('div');
    line.className = 'slice-line';
    line.style.top = top + 'px';
    line.dataset.idx = idx;

    const label = document.createElement('span');
    label.className = 'line-label';
    label.textContent = `${idx + 1}`;
    line.appendChild(label);

    const handle = document.createElement('span');
    handle.className = 'line-handle';
    handle.textContent = '× remove';
    handle.title = 'Double-click line to remove';
    handle.addEventListener('click', e => {
      e.stopPropagation();
      removeLine(idx);
    });
    line.appendChild(handle);

    makeDraggable(line, idx);
    editorWrap.appendChild(line);
  });

  const n = img.lines.length;
  lineCountEl.textContent = n === 1 ? '1 line' : `${n} lines`;
}

// ─── Trim handles rendering ───────────────────────────────────────────────────
function renderTrimHandles() {
  editorWrap.querySelectorAll('.trim-line, .trim-overlay').forEach(el => el.remove());

  const img = currentImage();
  if (!img) return;

  const imgW     = sourceImg.offsetWidth;
  const leftFrac  = img.trimLeft  ?? 0;
  const rightFrac = img.trimRight ?? 1;

  if (leftFrac > 0) {
    const o = document.createElement('div');
    o.className = 'trim-overlay';
    o.style.left  = '0';
    o.style.width = (leftFrac * imgW) + 'px';
    editorWrap.appendChild(o);
  }

  if (rightFrac < 1) {
    const o = document.createElement('div');
    o.className = 'trim-overlay';
    o.style.left  = (rightFrac * imgW) + 'px';
    o.style.right = '0';
    editorWrap.appendChild(o);
  }

  ['left', 'right'].forEach(side => {
    const frac = side === 'left' ? leftFrac : rightFrac;
    const line = document.createElement('div');
    line.className = 'trim-line';
    line.dataset.side = side;
    line.style.left = (frac * imgW) + 'px';
    const knob = document.createElement('div');
    knob.className = 'trim-handle';
    line.appendChild(knob);
    makeTrimDraggable(line, side);
    editorWrap.appendChild(line);
  });
}

// ─── Dragging lines ───────────────────────────────────────────────────────────
function makeDraggable(lineEl, idx) {
  let startY, startFrac, dragging = false;

  lineEl.addEventListener('mousedown', e => {
    if (e.target.classList.contains('line-handle')) return;
    e.preventDefault();
    dragging = true;
    startY = e.clientY;
    startFrac = currentImage().lines[idx];
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  lineEl.addEventListener('dblclick', e => {
    e.stopPropagation();
    removeLine(idx);
  });

  function onMove(e) {
    if (!dragging) return;
    const imgH = sourceImg.offsetHeight;
    const delta = e.clientY - startY;
    let newFrac = startFrac + delta / imgH;
    newFrac = Math.max(0.001, Math.min(0.999, newFrac));
    currentImage().lines[idx] = newFrac;
    lineEl.style.top = (newFrac * imgH) + 'px';
    renderSlices();
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    currentImage().lines.sort((a, b) => a - b);
    save();
    renderLines();
    renderSlices();
  }
}

// ─── Trim dragging ────────────────────────────────────────────────────────────
function makeTrimDraggable(trimEl, side) {
  let startX, startFrac, dragging = false;

  trimEl.addEventListener('mousedown', e => {
    e.preventDefault();
    e.stopPropagation();
    dragging = true;
    startX = e.clientX;
    const img = currentImage();
    startFrac = side === 'left' ? (img.trimLeft ?? 0) : (img.trimRight ?? 1);
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  function onMove(e) {
    if (!dragging) return;
    const imgW = sourceImg.offsetWidth;
    const delta = e.clientX - startX;
    let newFrac = startFrac + delta / imgW;

    const img = currentImage();
    if (side === 'left') {
      newFrac = Math.max(0, Math.min((img.trimRight ?? 1) - 0.02, newFrac));
      img.trimLeft = newFrac;
    } else {
      newFrac = Math.max((img.trimLeft ?? 0) + 0.02, Math.min(1, newFrac));
      img.trimRight = newFrac;
    }

    trimEl.style.left = (newFrac * imgW) + 'px';

    // update overlays in-place without rebuilding trim lines
    editorWrap.querySelectorAll('.trim-overlay').forEach(el => el.remove());
    const lf = img.trimLeft  ?? 0;
    const rf = img.trimRight ?? 1;
    if (lf > 0) {
      const o = document.createElement('div');
      o.className = 'trim-overlay';
      o.style.left  = '0';
      o.style.width = (lf * imgW) + 'px';
      editorWrap.insertBefore(o, editorWrap.firstChild);
    }
    if (rf < 1) {
      const o = document.createElement('div');
      o.className = 'trim-overlay';
      o.style.left  = (rf * imgW) + 'px';
      o.style.right = '0';
      editorWrap.insertBefore(o, editorWrap.firstChild);
    }

    renderSlices();
  }

  function onUp() {
    if (!dragging) return;
    dragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    save();
    renderTrimHandles();
    renderSlices();
  }
}

// ─── Slice names helpers ──────────────────────────────────────────────────────
function ensureSliceNames(img) {
  if (!img.sliceNames) img.sliceNames = [];
  const needed = img.lines.length + 1;
  while (img.sliceNames.length < needed) img.sliceNames.push('');
  if (img.sliceNames.length > needed) img.sliceNames.length = needed;
}

function ensureSliceTrimDisabled(img) {
  if (!img.sliceTrimDisabled) img.sliceTrimDisabled = [];
  const needed = img.lines.length + 1;
  while (img.sliceTrimDisabled.length < needed) img.sliceTrimDisabled.push(false);
  if (img.sliceTrimDisabled.length > needed) img.sliceTrimDisabled.length = needed;
}

function renameSlice(sliceIdx, newName) {
  const img = currentImage();
  if (!img) return;
  ensureSliceNames(img);
  img.sliceNames[sliceIdx] = newName.trim();
  save();
  renderSlices();
}

// ─── Add / remove lines ───────────────────────────────────────────────────────
function addLine(frac) {
  const img = currentImage();
  if (!img) return;
  ensureSliceNames(img);
  ensureSliceTrimDisabled(img);
  img.lines.push(frac);
  img.lines.sort((a, b) => a - b);
  const newIdx = img.lines.indexOf(frac);
  img.sliceNames.splice(newIdx + 1, 0, '');
  img.sliceTrimDisabled.splice(newIdx + 1, 0, false);
  save();
  renderLines();
  renderSlices();
}

function removeLine(idx) {
  const img = currentImage();
  if (!img) return;
  ensureSliceNames(img);
  ensureSliceTrimDisabled(img);
  img.lines.splice(idx, 1);
  img.sliceNames.splice(idx + 1, 1);
  img.sliceTrimDisabled.splice(idx + 1, 1);
  save();
  renderLines();
  renderSlices();
}

// Click on image → add line
editorWrap.addEventListener('click', e => {
  if (e.target.classList.contains('slice-line') ||
      e.target.classList.contains('line-handle') ||
      e.target.classList.contains('line-label') ||
      e.target.classList.contains('trim-line') ||
      e.target.classList.contains('trim-handle') ||
      e.target.closest('.trim-line')) return;
  const rect = editorWrap.getBoundingClientRect();
  const y    = e.clientY - rect.top;
  const frac = y / sourceImg.offsetHeight;
  if (frac > 0.001 && frac < 0.999) addLine(frac);
});

// ─── Slices rendering ─────────────────────────────────────────────────────────
function renderSlices() {
  const img = currentImage();
  if (!img) return;

  const imgEl  = sourceImg;
  const origW  = imgEl.naturalWidth;
  const origH  = imgEl.naturalHeight;

  const cuts = [0, ...img.lines.map(f => Math.round(f * origH)), origH];

  rightBody.innerHTML = '';

  if (cuts.length < 2) {
    rightBody.appendChild(emptyRight);
    sliceCountEl.textContent = '0';
    return;
  }

  const sliceCount = cuts.length - 1;
  sliceCountEl.textContent = String(sliceCount);
  emptyRight.style.display = 'none';

  const projName = safeFilename(currentProject()?.name || 'project');
  const baseName = safeFilename(img.name || 'image');
  ensureSliceNames(img);
  ensureSliceTrimDisabled(img);

  const bitmapImg = new Image();
  bitmapImg.src = img.dataUrl;

  const draw = () => {
    for (let i = 0; i < sliceCount; i++) {
      const srcY = cuts[i];
      const srcH = cuts[i + 1] - cuts[i];
      if (srcH <= 0) continue;

      // Compute trim bounds
      const hasTrim = (img.trimLeft ?? 0) > 0 || (img.trimRight ?? 1) < 1;
      const trimDisabled = img.sliceTrimDisabled[i] ?? false;
      const tLeft  = (!hasTrim || trimDisabled) ? 0     : Math.round((img.trimLeft  ?? 0) * origW);
      const tRight = (!hasTrim || trimDisabled) ? origW : Math.round((img.trimRight ?? 1) * origW);
      const trimW  = tRight - tLeft;
      if (trimW <= 0) continue;

      const item = document.createElement('div');
      item.className = 'slice-item';

      const hdr = document.createElement('div');
      hdr.className = 'slice-item-header';

      // Editable slice name
      const nameSpan = document.createElement('span');
      nameSpan.className = 'slice-name';
      const customName = img.sliceNames[i] || '';
      nameSpan.textContent = customName || `Slice ${i + 1}`;
      nameSpan.title = 'Click to rename';
      nameSpan.addEventListener('click', () => startSliceRename(nameSpan, i));
      hdr.appendChild(nameSpan);

      const dims = document.createElement('span');
      dims.className = 'slice-dims';
      dims.textContent = `${trimW} × ${srcH}px`;
      hdr.appendChild(dims);

      const dlBtn = document.createElement('button');
      dlBtn.className = 'btn btn-ghost btn-sm';
      dlBtn.textContent = '↓ Download';
      hdr.appendChild(dlBtn);

      const canvas = document.createElement('canvas');
      canvas.width  = trimW;
      canvas.height = srcH;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(bitmapImg, tLeft, srcY, trimW, srcH, 0, 0, trimW, srcH);

      dlBtn.addEventListener('click', () => {
        const sliceName = img.sliceNames[i];
        const filename = sliceName
          ? `${projName}-${baseName}-${safeFilename(sliceName)}.png`
          : `${projName}-${baseName}-slice-${i + 1}.png`;
        const a = document.createElement('a');
        a.href     = canvas.toDataURL('image/png');
        a.download = filename;
        a.click();
      });

      const copyBtn = document.createElement('button');
      copyBtn.className = 'btn btn-ghost btn-sm';
      copyBtn.textContent = '⎘ Copy';
      copyBtn.addEventListener('click', () => {
        canvas.toBlob(blob => {
          navigator.clipboard.write([
            new ClipboardItem({ 'image/png': blob })
          ]).then(() => {
            copyBtn.textContent = '✓ Copied';
            setTimeout(() => { copyBtn.textContent = '⎘ Copy'; }, 1500);
          }).catch(() => {
            copyBtn.textContent = '✗ Failed';
            setTimeout(() => { copyBtn.textContent = '⎘ Copy'; }, 1500);
          });
        });
      });
      hdr.appendChild(copyBtn);

      // Trim toggle button (only when trim is active on image)
      if (hasTrim) {
        const trimBtn = document.createElement('button');
        trimBtn.className = 'btn btn-ghost btn-sm' + (trimDisabled ? '' : ' trim-active');
        trimBtn.textContent = trimDisabled ? '⬚ Trim off' : '⬚ Trim on';
        trimBtn.title = trimDisabled ? 'Trim disabled for this slice — click to enable' : 'Trim enabled — click to disable for this slice';
        trimBtn.addEventListener('click', () => {
          ensureSliceTrimDisabled(img);
          img.sliceTrimDisabled[i] = !img.sliceTrimDisabled[i];
          save();
          renderSlices();
        });
        hdr.appendChild(trimBtn);
      }

      item.appendChild(hdr);
      item.appendChild(canvas);
      rightBody.appendChild(item);
    }
  };

  if (bitmapImg.complete) {
    draw();
  } else {
    bitmapImg.onload = draw;
  }
}

// ─── Upload controls ──────────────────────────────────────────────────────────
btnUpload.addEventListener('click', () => fileInput.click());
btnAddImage.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  addImageToProject(fileInput.files[0]);
  fileInput.value = '';
});

dropZone.addEventListener('click', () => fileInput.click());

dropZone.addEventListener('dragover', e => {
  e.preventDefault();
  dropZone.classList.add('drag-over');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  addImageToProject(e.dataTransfer.files[0]);
});

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  if (dragType) return; // sidebar reorder in progress
  addImageToProject(e.dataTransfer.files[0]);
});

document.addEventListener('paste', e => {
  const items = e.clipboardData?.items;
  if (!items) return;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      addImageToProject(item.getAsFile());
      break;
    }
  }
});

btnNewProject.addEventListener('click', () => {
  createProject(`Project ${state.projects.length + 1}`, { autoRename: true });
});

window.addEventListener('resize', () => {
  if (currentImage()) { renderLines(); renderTrimHandles(); }
});

// ─── Sidebar resize ───────────────────────────────────────────────────────────
const SIDEBAR_MIN = 130, SIDEBAR_MAX = 380;
sidebarResizer.addEventListener('mousedown', e => {
  e.preventDefault();
  const startX = e.clientX;
  const startW = sidebar.offsetWidth;
  sidebarResizer.classList.add('resizing');
  function onMove(e) {
    const w = Math.min(SIDEBAR_MAX, Math.max(SIDEBAR_MIN, startW + e.clientX - startX));
    sidebar.style.width = w + 'px';
  }
  function onUp() {
    sidebarResizer.classList.remove('resizing');
    state.sidebarWidth = sidebar.offsetWidth;
    save();
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
if (state.projects.length === 0) {
  state.projects.push({ name: 'Project 1', images: [] });
}
load();
sidebar.style.width = (state.sidebarWidth || 190) + 'px';
render();
</script>
